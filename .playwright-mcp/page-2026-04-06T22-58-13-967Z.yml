              - paragraph [ref=e70]: Enabling default encryption (SSE-S3) on the S3 bucket is the most operationally efficient approach. All objects are automatically encrypted without requiring changes to application code or bucket policies. SSE-S3 uses AES-256 encryption managed by AWS.
